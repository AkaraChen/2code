name: Release

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Publish as a prerelease"
        type: boolean
        default: false
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Publish (${{ matrix.name }})
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            platform: macos-15
            rustTargets: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - name: macOS x64
            platform: macos-15-intel
            rustTargets: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          - name: Linux x64
            platform: ubuntu-24.04
            rustTargets: ""
            args: ""
          - name: Windows x64
            platform: windows-latest
            rustTargets: ""
            args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            just \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install just (macOS)
        if: runner.os == 'macOS'
        run: brew install just

      - name: Install just (Windows)
        if: runner.os == 'Windows'
        run: choco install just -y

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTargets }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install app dependencies
        run: bun install --frozen-lockfile

      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: bun tauri
          tagName: v__VERSION__
          releaseName: 2code v__VERSION__
          releaseBody: See the assets to download this version and install.
          releaseDraft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || contains(github.ref_name, '-') }}
          generateReleaseNotes: true
          includeUpdaterJson: true
          retryAttempts: 2
          args: ${{ matrix.args }}
