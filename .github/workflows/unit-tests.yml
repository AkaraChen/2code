name: Unit Tests

on:
  push:
    branches:
      - dev
      - "codex/**"
  pull_request:
    branches:
      - dev

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Run Vitest
        run: bun run test

  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-14
          - windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            just \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Build helper sidecar for tests
        shell: bash
        run: |
          set -euo pipefail
          TARGET_TRIPLE="$(rustc -vV | sed -n 's/^host: //p')"
          BIN_SUFFIX=""
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            BIN_SUFFIX=".exe"
          fi
          cargo build --manifest-path src-tauri/Cargo.toml -p twocode-helper
          mkdir -p src-tauri/binaries
          cp -f "src-tauri/target/debug/2code-helper${BIN_SUFFIX}" "src-tauri/binaries/2code-helper-${TARGET_TRIPLE}${BIN_SUFFIX}"
          chmod +x "src-tauri/binaries/2code-helper-${TARGET_TRIPLE}${BIN_SUFFIX}"

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml
